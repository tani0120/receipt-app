<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Noto Sans JP: @fontsource/noto-sans-jp からローカルバンドル（main.tsでimport） -->
  <title>スグスル</title>
  <!-- Google Identity Services（GIS）: Googleログイン用 -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
  <!-- Vue初期化前ローディング（Vueマウント後に自動消去） -->
  <div id="app-loader">
    <div class="loader-glow"></div>
    <div class="loader-card">
      <div class="loader-logo">
        <div class="loader-orbit-wrap">
          <svg viewBox="0 0 80 80" width="80" height="80" fill="none">
            <circle cx="40" cy="40" r="36" stroke="url(#lg)" stroke-width="2" stroke-linecap="round" stroke-dasharray="90 40" class="loader-orbit"/>
            <circle cx="40" cy="40" r="24" stroke="url(#lg)" stroke-width="1.5" stroke-dasharray="40 20" class="loader-orbit-inner"/>
            <defs><linearGradient id="lg" x1="0" y1="0" x2="80" y2="80"><stop stop-color="#a78bfa"/><stop offset="1" stop-color="#60a5fa"/></linearGradient></defs>
          </svg>
          <img src="/sugu-suru-logo.png" alt="スグスル" class="loader-logo-img" />
        </div>
      </div>
      <div class="loader-dots"><span></span><span></span><span></span></div>
    </div>
  </div>
  <style>
    body { margin: 0; overflow: hidden; }
    #app-loader {
      position: fixed; inset: 0; z-index: 99999;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 30%, #4c1d95 60%, #581c87 100%);
      transition: opacity 0.5s cubic-bezier(0.4,0,0.2,1);
    }
    #app-loader.fade-out { opacity: 0; pointer-events: none; }

    /* 背景グロウ */
    .loader-glow {
      position: absolute; width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139,92,246,0.3) 0%, transparent 70%);
      animation: glow-pulse 3s ease-in-out infinite;
    }
    @keyframes glow-pulse {
      0%,100% { transform: scale(0.8); opacity: 0.4; }
      50% { transform: scale(1.2); opacity: 0.8; }
    }

    /* グラスモーフィズムカード */
    .loader-card {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center; gap: 20px;
      padding: 48px 56px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    /* 回転するSVGオービット */
    .loader-orbit { animation: spin 2.5s linear infinite; transform-origin: center; }
    .loader-orbit-inner { animation: spin-reverse 1.8s linear infinite; transform-origin: center; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes spin-reverse { to { transform: rotate(-360deg); } }

    /* ロゴ + オービットラップ */
    .loader-orbit-wrap {
      position: relative; width: 80px; height: 80px;
      display: flex; align-items: center; justify-content: center;
    }
    .loader-orbit-wrap svg { position: absolute; inset: 0; }
    .loader-logo-img {
      position: relative; z-index: 1;
      height: 36px; width: auto;
      filter: brightness(0) invert(1);
      animation: logo-pulse 2.5s ease-in-out infinite;
    }
    @keyframes logo-pulse {
      0%,100% { opacity: 0.8; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }

    /* 3ドットバウンス */
    .loader-dots { display: flex; gap: 8px; }
    .loader-dots span {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(196,181,253,0.6);
      animation: bounce 1.4s ease-in-out infinite;
    }
    .loader-dots span:nth-child(2) { animation-delay: 0.16s; }
    .loader-dots span:nth-child(3) { animation-delay: 0.32s; }
    @keyframes bounce {
      0%,80%,100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1.2); opacity: 1; }
    }
  </style>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
