<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Noto Sans JP: @fontsource/noto-sans-jp からローカルバンドル（main.tsでimport） -->
  <title>スグスル</title>
  <!-- Google Identity Services（GIS）: Googleログイン用 -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link rel="stylesheet" href="/loader.css">
</head>

<body>
  <!-- Vue初期化前ローディング（Vueマウント後に自動消去） -->
  <div id="app-loader">
    <div class="loader-glow"></div>
    <div class="loader-card">
      <div class="loader-logo">
        <div class="loader-orbit-wrap">
          <svg viewBox="0 0 80 80" width="80" height="80" fill="none">
            <circle cx="40" cy="40" r="36" stroke="url(#lg)" stroke-width="2" stroke-linecap="round" stroke-dasharray="90 40" class="loader-orbit"/>
            <circle cx="40" cy="40" r="24" stroke="url(#lg)" stroke-width="1.5" stroke-dasharray="40 20" class="loader-orbit-inner"/>
            <defs><linearGradient id="lg" x1="0" y1="0" x2="80" y2="80"><stop stop-color="#a78bfa"/><stop offset="1" stop-color="#60a5fa"/></linearGradient></defs>
          </svg>
          <img src="/sugu-suru-logo.png" alt="スグスル" class="loader-logo-img" />
        </div>
      </div>
      <div class="loader-dots"><span></span><span></span><span></span></div>
    </div>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
