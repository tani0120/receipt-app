<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8"><title>エラー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  background:linear-gradient(160deg,#f0f4f8 0%,#e8edf5 40%,#f5f0fa 70%,#faf5f0 100%);
  font-family:'Noto Sans JP',sans-serif;
  overflow:hidden;
}
body::before,body::after{
  content:'';position:fixed;border-radius:50%;filter:blur(80px);opacity:.3;pointer-events:none;
}
body::before{width:500px;height:500px;top:-120px;right:-80px;background:radial-gradient(circle,#c4b5fd 0%,transparent 70%)}
body::after{width:400px;height:400px;bottom:-100px;left:-60px;background:radial-gradient(circle,#93c5fd 0%,transparent 70%)}

/* ===== PortalHeader.vue 準拠 ===== */
.portal-header-bar{
  width:100%;background:#fff;border-bottom:1px solid #e5e7eb;
  position:sticky;top:0;z-index:30;box-shadow:0 1px 3px rgba(0,0,0,.04);
}
.portal-header-inner{
  max-width:1440px;margin:0 auto;
  padding:clamp(8px,2vw,12px) clamp(12px,3vw,24px);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.portal-logo-img{height:clamp(24px,4vw,32px);opacity:.85;display:block}
.portal-company-badge{
  display:inline-flex;align-items:center;
  gap:clamp(4px,1vw,6px);padding:clamp(4px,1vw,6px) clamp(10px,2vw,16px);
  border-radius:20px;background:#eff6ff;border:1px solid #bfdbfe;flex-shrink:0;
}
.portal-company-icon{font-size:clamp(11px,2vw,14px);line-height:1}
.portal-company-name{font-size:clamp(10px,2.5vw,13px);font-weight:700;color:#1e40af;white-space:nowrap}

/* ===== メインコンテンツ ===== */
.main{flex:1;display:flex;align-items:center;justify-content:center;position:relative;z-index:1}
.card{
  text-align:center;padding:48px 44px;
  background:rgba(255,255,255,.75);backdrop-filter:blur(16px);
  border-radius:24px;
  box-shadow:0 8px 32px rgba(0,0,0,.06),0 1px 4px rgba(0,0,0,.04);
  border:1px solid rgba(255,255,255,.6);
  max-width:440px;width:90%;
  animation:fadeUp .5s ease-out;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.card-icon{
  width:64px;height:64px;margin:0 auto 20px;
  background:linear-gradient(135deg,#eff6ff,#ede9fe);border-radius:16px;
  display:flex;align-items:center;justify-content:center;font-size:28px;
}
h1{font-size:18px;font-weight:700;color:#1e293b;margin:0 0 8px;line-height:1.6}
.sub{font-size:13px;color:#94a3b8;margin:0 0 28px;line-height:1.8}
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:12px 28px;background:linear-gradient(135deg,#3b82f6,#2563eb);
  color:#fff;font-size:14px;font-weight:600;border-radius:12px;border:none;cursor:pointer;
  transition:transform .15s,box-shadow .15s;text-decoration:none;
}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(37,99,235,.3)}
.btn:active{transform:scale(.97)}
</style></head>
<body>

<!-- PortalHeader.vue 準拠 -->
<nav class="portal-header-bar">
  <div class="portal-header-inner">
    <div><img src="/sugu-suru-logo.png" alt="sugu-suru" class="portal-logo-img"></div>
    <div class="portal-company-badge">
      <span class="portal-company-icon">🏢</span>
      <span class="portal-company-name">株式会社LDIデジタル</span>
    </div>
  </div>
</nav>

<main class="main">
  <div class="card">
    <div class="card-icon">📄</div>
    <h1>お探しのページにアクセスできませんでした。</h1>
    <p class="sub">お手数ですが、前のページからやり直してください。</p>
    <button class="btn" onclick="history.length>1?history.back():location.href='/'">
      <i class="fa-solid fa-arrow-left"></i> 前のページに戻る
    </button>
  </div>
</main>

</body>
</html>
