<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8"><title>エラー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;flex-direction:column;background:#f5f7fa;font-family:'Noto Sans JP',sans-serif}

/* ===== ナビバー ===== */
.navbar{
  width:100%;height:53px;background:#fff;border-bottom:1px solid #e5e7eb;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 12px;flex-shrink:0;
}
.nav-left{display:flex;align-items:center;gap:12px}
.nav-logo{height:30px}
.nav-right{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:500;color:#4b5563}
.nav-item{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;background:none;border:none;cursor:default;font:inherit;color:inherit}
.nav-sep{color:#d1d5db}
.nav-item i{font-size:10px}

/* ===== メイン ===== */
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.error-card{
  width:100%;max-width:520px;background:#fff;border-radius:16px;
  box-shadow:0 4px 24px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.04);
  border:1px solid #e5e7eb;overflow:hidden;animation:fadeUp .4s ease-out;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ヘッダー */
.error-header{padding:28px 32px 20px;display:flex;align-items:center;gap:16px}
.error-code{font-size:36px;font-weight:900;font-family:'JetBrains Mono',monospace;line-height:1;transition:color .2s}
.error-hdr-text h1{font-size:16px;font-weight:700;color:#1e293b;margin:0 0 2px}
.error-hdr-sub{font-size:12px;color:#94a3b8}

/* ログ */
.error-body{padding:0 32px 24px}
.log-label{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin:0 0 8px;display:flex;align-items:center;gap:6px}
.log-box{
  background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;
  padding:16px 18px;padding-right:80px;
  font-size:12px;color:#334155;line-height:2;position:relative;
}
.log-row{display:flex;gap:4px}
.log-key{color:#64748b;font-weight:600;white-space:nowrap;font-family:'Noto Sans JP',sans-serif;font-size:11px}
.log-val{color:#1e293b;font-family:'JetBrains Mono',monospace;font-size:12px}
.copy-btn{
  position:absolute;top:10px;right:10px;
  padding:6px 12px;font-size:11px;font-weight:600;
  background:#fff;border:1px solid #e2e8f0;border-radius:6px;
  color:#64748b;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s;
}
.copy-btn:hover{background:#eff6ff;color:#2563eb;border-color:#bfdbfe}
.copy-btn.copied{background:#ecfdf5;color:#059669;border-color:#a7f3d0}

/* 報告 */
.report-msg{
  margin:14px 0 0;padding:12px 16px;
  background:#fffbeb;border:1px solid #fde68a;border-radius:8px;
  font-size:12px;color:#92400e;line-height:1.7;display:flex;align-items:flex-start;gap:8px;
}
.report-msg i{color:#f59e0b;margin-top:2px;flex-shrink:0}
/* 401専用 */
.report-msg.relogin{background:#eff6ff;border-color:#bfdbfe;color:#1e40af}
.report-msg.relogin i{color:#3b82f6}

/* フッター */
.error-footer{padding:0 32px 28px;display:flex;gap:10px}
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 24px;font-size:13px;font-weight:600;
  border-radius:10px;border:none;cursor:pointer;
  transition:transform .15s,box-shadow .15s;text-decoration:none;
}
.btn-home{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff}
.btn-home:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(37,99,235,.25)}
.btn-relogin{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff}
.btn-relogin:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(217,119,6,.25)}

/* プレビュー用セレクタ */
.preview-selector{
  padding:16px 32px 0;display:flex;align-items:center;gap:10px;
}
.preview-selector label{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:1px}
.preview-selector select{
  padding:6px 12px;font-size:13px;font-weight:600;
  border:1px solid #e2e8f0;border-radius:8px;background:#f8fafc;
  color:#1e293b;cursor:pointer;font-family:'JetBrains Mono',monospace;
}
</style>
</head>
<body>

<!-- ナビバー -->
<nav class="navbar">
  <div class="nav-left"><img src="/sugu-suru-logo.png" alt="sugu-suru" class="nav-logo"></div>
  <div class="nav-right">
    <span class="nav-item"><i class="fa-solid fa-bars-progress"></i> 進捗管理</span><span class="nav-sep">|</span>
    <span class="nav-item"><i class="fa-solid fa-building"></i> 顧問先管理</span><span class="nav-sep">|</span>
    <span class="nav-item"><i class="fa-solid fa-users"></i> スタッフ管理</span><span class="nav-sep">|</span>
    <span class="nav-item"><i class="fa-solid fa-warehouse"></i> マスタ管理</span><span class="nav-sep">|</span>
    <span class="nav-item"><i class="fa-solid fa-calculator"></i> 想定費用</span><span class="nav-sep">|</span>
    <span class="nav-item"><i class="fa-solid fa-gear"></i> 設定管理</span>
  </div>
</nav>

<main class="main">
  <div class="error-card">
    <!-- プレビュー用: エラーコード切替 -->
    <div class="preview-selector">
      <label>エラーコード:</label>
      <select id="codeSelect" onchange="switchError(Number(this.value))">
        <option value="400">400 — 不正なリクエスト</option>
        <option value="401">401 — 認証切れ</option>
        <option value="403">403 — 権限不足</option>
        <option value="404" selected>404 — 未検出</option>
        <option value="408">408 — タイムアウト</option>
        <option value="413">413 — サイズ超過</option>
        <option value="429">429 — レート制限</option>
        <option value="500">500 — サーバーエラー</option>
        <option value="502">502 — 外部サービス障害</option>
        <option value="503">503 — メンテナンス中</option>
      </select>
    </div>

    <!-- ヘッダー -->
    <div class="error-header">
      <div class="error-code" id="errCode" style="color:#f59e0b">404</div>
      <div class="error-hdr-text">
        <h1 id="errTitle">エラーが発生しました</h1>
        <div class="error-hdr-sub" id="errSub">ページが見つかりません</div>
      </div>
    </div>

    <!-- ログ -->
    <div class="error-body">
      <div class="log-label"><i class="fa-solid fa-clipboard-list"></i> エラー情報</div>
      <div class="log-box">
        <button class="copy-btn" id="copyBtn" onclick="copyLog()"><i class="fa-regular fa-copy"></i> コピー</button>
        <div class="log-row"><span class="log-key">エラーコード:</span> <span class="log-val" id="logCode">404</span></div>
        <div class="log-row"><span class="log-key">パス:</span> <span class="log-val" id="logPath">/staff/unknown-page</span></div>
        <div class="log-row"><span class="log-key">リクエストID:</span> <span class="log-val" id="logReqId">f7e2d9a4</span></div>
        <div class="log-row"><span class="log-key">発生日時:</span> <span class="log-val" id="logTime"></span></div>
        <div class="log-row"><span class="log-key">詳細:</span> <span class="log-val" id="logDetail">ルート定義に一致しません</span></div>
      </div>

      <div class="report-msg" id="reportMsg">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <span id="reportText">上記の内容をコピーし、<b>管理者</b>に報告してください。</span>
      </div>
    </div>

    <!-- フッター -->
    <div class="error-footer" id="footerArea">
      <a class="btn btn-home" href="/#/master/progress"><i class="fa-solid fa-house"></i> ホームに戻る</a>
    </div>
  </div>
</main>

<script>
const errors = {
  400:{sub:'不正なリクエスト',path:'/api/clients',detail:'パラメータが不正です',color:'#ef4444',report:'normal'},
  401:{sub:'認証切れ',path:'/api/clients',detail:'セッションが期限切れです',color:'#3b82f6',report:'relogin'},
  403:{sub:'アクセスが拒否されました',path:'/api/admin/settings',detail:'権限がありません',color:'#8b5cf6',report:'normal'},
  404:{sub:'ページが見つかりません',path:'/staff/unknown-page',detail:'ルート定義に一致しません',color:'#f59e0b',report:'normal'},
  408:{sub:'リクエストタイムアウト',path:'/api/pipeline/upload-chunk',detail:'処理時間が上限を超えました',color:'#f97316',report:'retry'},
  413:{sub:'ファイルサイズ超過',path:'/api/drive/upload',detail:'アップロード上限（10MB）を超えています',color:'#ef4444',report:'resize'},
  429:{sub:'リクエスト制限',path:'/api/clients',detail:'短時間にリクエストが集中しました',color:'#f97316',report:'wait'},
  500:{sub:'サーバー内部エラー',path:'/api/clients',detail:'サーバーエラーが発生しました',color:'#ef4444',report:'normal'},
  502:{sub:'外部サービス障害',path:'/api/drive/files',detail:'外部サービスに接続できません',color:'#f97316',report:'normal'},
  503:{sub:'サービス一時停止中',path:'/api/documents',detail:'メンテナンス中です',color:'#f97316',report:'wait'},
};

const reports = {
  normal: {cls:'',icon:'fa-solid fa-triangle-exclamation',text:'上記の内容をコピーし、<b>管理者</b>に報告してください。'},
  relogin:{cls:'relogin',icon:'fa-solid fa-right-to-bracket',text:'セッションが切れました。<b>再ログイン</b>してください。'},
  retry:  {cls:'',icon:'fa-solid fa-rotate-right',text:'時間をおいて<b>もう一度お試しください</b>。解消しない場合は管理者に報告してください。'},
  resize: {cls:'',icon:'fa-solid fa-compress',text:'ファイルを分割するか、サイズを小さくして<b>再度アップロード</b>してください。'},
  wait:   {cls:'',icon:'fa-solid fa-clock',text:'しばらく待ってから<b>再度お試しください</b>。'},
};

const footers = {
  normal:  '<a class="btn btn-home" href="/#/master/progress"><i class="fa-solid fa-house"></i> ホームに戻る</a>',
  relogin: '<a class="btn btn-relogin" href="/#/login"><i class="fa-solid fa-right-to-bracket"></i> 再ログイン</a>  <a class="btn btn-home" href="/#/master/progress"><i class="fa-solid fa-house"></i> ホームに戻る</a>',
  retry:   '<a class="btn btn-home" href="/#/master/progress"><i class="fa-solid fa-house"></i> ホームに戻る</a>',
  resize:  '<a class="btn btn-home" href="/#/master/progress"><i class="fa-solid fa-house"></i> ホームに戻る</a>',
  wait:    '<a class="btn btn-home" href="/#/master/progress"><i class="fa-solid fa-house"></i> ホームに戻る</a>',
};

function now(){return new Date().toLocaleString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'}).replace(/\//g,'-')}
document.getElementById('logTime').textContent = now();

function switchError(code) {
  const e = errors[code];
  const r = reports[e.report];
  document.getElementById('errCode').textContent = code;
  document.getElementById('errCode').style.color = e.color;
  document.getElementById('errTitle').textContent = 'エラーが発生しました';
  document.getElementById('errSub').textContent = e.sub;
  document.getElementById('logCode').textContent = code;
  document.getElementById('logPath').textContent = e.path;
  document.getElementById('logReqId').textContent = Math.random().toString(36).slice(2,10);
  document.getElementById('logTime').textContent = now();
  document.getElementById('logDetail').textContent = e.detail;
  const msg = document.getElementById('reportMsg');
  msg.className = 'report-msg ' + r.cls;
  msg.innerHTML = `<i class="${r.icon}"></i><span>${r.text}</span>`;
  document.getElementById('footerArea').innerHTML = footers[e.report];
}

function copyLog() {
  const v = id => document.getElementById(id).textContent;
  const text = `エラーコード: ${v('logCode')}\nパス: ${v('logPath')}\nリクエストID: ${v('logReqId')}\n発生日時: ${v('logTime')}\n詳細: ${v('logDetail')}`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.innerHTML = '<i class="fa-solid fa-check"></i> コピー済み';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = '<i class="fa-regular fa-copy"></i> コピー';
      btn.classList.remove('copied');
    }, 2000);
  });
}
</script>
</body>
</html>
